# ESP8266 ESP-01 1M
[env]
framework = arduino
lib_deps =
    mikalhart/TinyGPSPlus @ ^1.0.3
    plerup/EspSoftwareSerial @ ^8.2.0
    bmellink/IBusBM @ ^1.1.4

[env:esp01_1m]
platform = espressif8266
board = esp01_1m
build_flags = 
            -DGPS_quectel
            -DGPS_RX_PIN=0
            -DGPS_TX_PIN=2
            -Dfs_OTA
            -Dfs_RECEPTEUR
            -Dfs_STAT
            -DpinFactoryReset=2
            -DpinLED=1

# ESP32 DEVKIT
[env:esp32dev]
platform = espressif32
board = esp32dev

monitor_speed = 115200
upload_speed = 921600
build_flags = 
    -DGPS_quectel
    -DiBus_RX=20
    -DiBus_TX=21
    -DGPS_RX_PIN=8
    -DGPS_TX_PIN=9
    -Dfs_OTA
    -Dfs_RECEPTEUR
    -Dfs_STAT
    -Dfs_iBus
 